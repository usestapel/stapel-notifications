{% extends "notifications/email/_base.html" %}

{% block preheader %}{{ body }}{% endblock %}

{% block content %}
              <h1 style="margin: 0 0 16px 0; font-family: Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 600; line-height: 26px; color: {{ brand_text|default:"#1C1D20" }};">
                {{ heading }}
              </h1>
              <p style="margin: 0 0 8px 0; font-family: Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 400; line-height: 22px; color: {{ brand_text|default:"#1C1D20" }};">
                {{ body }}
              </p>
              <!-- CTA Button -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" class="button-td" style="padding: 28px 0 0 0;">
                <tr>
                  <td align="left">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="background-color: {{ brand_primary_dark|default:"#2A90D9" }}; border-radius: 20px;">
                          <a href="{{ chat_url }}" class="button-link" style="display: inline-block; padding: 12px 32px; font-family: Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 400; line-height: 24px; color: #FFFFFF; text-decoration: none; border-radius: 20px;">
                            {{ cta }}
                          </a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
{% endblock %}
