{% extends "notifications/email/_base.html" %}

{% block content %}
              <h1 style="margin: 0 0 16px 0; font-family: Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 600; line-height: 26px; color: {{ brand_text|default:"#1C1D20" }};">
                {{ heading }}
              </h1>

              <p style="margin: 0 0 24px 0; font-family: Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 400; line-height: 22px; color: {{ brand_text|default:"#1C1D20" }};">
                {{ body }}
              </p>

              <!-- Credentials box -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td style="background-color: {{ brand_bg|default:"#F5F5F6" }}; border-radius: 12px; padding: 20px 24px;">
                    <p style="margin: 0 0 4px 0; font-family: Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; color: #7D7E81;">
                      {{ username_label }}
                    </p>
                    <p style="margin: 0 0 16px 0; font-family: 'Courier New', Courier, monospace; font-size: 16px; font-weight: 700; line-height: 22px; color: {{ brand_text|default:"#1C1D20" }};">
                      {{ username }}
                    </p>
                    {% if initial_password %}
                    <p style="margin: 0 0 4px 0; font-family: Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; color: #7D7E81;">
                      {{ password_label }}
                    </p>
                    <p style="margin: 0; font-family: 'Courier New', Courier, monospace; font-size: 16px; font-weight: 700; line-height: 22px; color: {{ brand_text|default:"#1C1D20" }};">
                      {{ initial_password }}
                    </p>
                    {% endif %}
                  </td>
                </tr>
              </table>

              <!-- CTA Button -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" class="button-td" style="padding: 28px 0 0 0;">
                <tr>
                  <td align="left">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="background-color: {{ brand_primary_dark|default:"#2A90D9" }}; border-radius: 20px;">
                          <a href="{{ login_url }}" style="display: inline-block; padding: 12px 32px; font-family: Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 400; line-height: 24px; color: #FFFFFF; text-decoration: none; border-radius: 20px;">
                            {{ cta }}
                          </a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>

              <p style="margin: 20px 0 0 0; font-family: Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; line-height: 20px; color: #7D7E81;">
                {{ warning }}
              </p>
{% endblock %}
