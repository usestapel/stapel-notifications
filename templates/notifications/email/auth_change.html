{% extends "notifications/email/_base.html" %}

{% block content %}
              <h1 style="margin: 0 0 16px 0; font-family: Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 600; line-height: 26px; color: {{ brand_text|default:"#1C1D20" }};">
                {{ heading }}
              </h1>
              <p style="margin: 0 0 8px 0; font-family: Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 400; line-height: 22px; color: {{ brand_text|default:"#1C1D20" }};">
                {{ body }}
              </p>
              {% if warning %}
              <p style="margin: 16px 0 0 0; font-family: Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; line-height: 20px; color: #7D7E81;">
                {{ warning }}
              </p>
              {% endif %}
{% endblock %}
